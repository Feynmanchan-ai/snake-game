<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>贪吃蛇</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #eee;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 90vmin;
    max-width: 400px;
    padding: 10px 0;
  }

  .score-box {
    background: #16213e;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 16px;
    border: 1px solid #0f3460;
  }

  .score-box span {
    color: #e94560;
    font-weight: bold;
    font-size: 20px;
  }

  #gameCanvas {
    border: 2px solid #0f3460;
    border-radius: 8px;
    background: #16213e;
    touch-action: none;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .controls-row {
    display: flex;
    gap: 5px;
  }

  .ctrl-btn {
    width: 65px;
    height: 65px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 12px;
    color: #eee;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .ctrl-btn:active {
    background: #0f3460;
  }

  .ctrl-placeholder {
    width: 65px;
    height: 65px;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .overlay.hidden {
    display: none;
  }

  .overlay h1 {
    font-size: 32px;
    margin-bottom: 10px;
    color: #e94560;
  }

  .overlay h2 {
    font-size: 24px;
    margin-bottom: 5px;
  }

  .overlay p {
    font-size: 16px;
    color: #aaa;
    margin-bottom: 20px;
  }

  .overlay button {
    padding: 12px 40px;
    font-size: 18px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .overlay button:active {
    background: #c73650;
  }

  .emoji-food {
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- 开始界面 -->
<div class="overlay" id="startOverlay">
  <h1>🐍 贪吃蛇</h1>
  <p>滑动屏幕 或 使用按钮控制方向</p>
  <button onclick="startGame()">开始游戏</button>
</div>

<!-- 结束界面 -->
<div class="overlay hidden" id="gameOverOverlay">
  <h1>游戏结束</h1>
  <h2>得分：<span id="finalScore">0</span></h2>
  <p>最高分：<span id="bestScore">0</span></p>
  <button onclick="startGame()">再来一局</button>
</div>

<!-- 游戏界面 -->
<div class="header">
  <div class="score-box">分数：<span id="score">0</span></div>
  <div class="score-box">最高：<span id="highScore">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- 虚拟方向键 -->
<div class="controls">
  <div class="controls-row">
    <div class="ctrl-placeholder"></div>
    <div class="ctrl-btn" ontouchstart="changeDir('up')" onclick="changeDir('up')">▲</div>
    <div class="ctrl-placeholder"></div>
  </div>
  <div class="controls-row">
    <div class="ctrl-btn" ontouchstart="changeDir('left')" onclick="changeDir('left')">◀</div>
    <div class="ctrl-btn" ontouchstart="changeDir('down')" onclick="changeDir('down')">▼</div>
    <div class="ctrl-btn" ontouchstart="changeDir('right')" onclick="changeDir('right')">▶</div>
  </div>
</div>

<script>
// ========== 游戏配置 ==========
const GRID_COUNT = 20;
const SPEED_INITIAL = 150;
const SPEED_MIN = 80;
const SPEED_STEP = 2;

// ========== 全局变量 ==========
let canvas, ctx, cellSize;
let snake, food, direction, nextDirection;
let score, highScore, gameLoop, isRunning;
let touchStartX, touchStartY;

// ========== 初始化画布 ==========
function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  const maxSize = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.55, 400);
  const size = Math.floor(maxSize / GRID_COUNT) * GRID_COUNT;

  canvas.width = size;
  canvas.height = size;
  cellSize = size / GRID_COUNT;
}

// ========== 开始游戏 ==========
function startGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');

  highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
  document.getElementById('highScore').textContent = highScore;

  score = 0;
  document.getElementById('score').textContent = score;

  // 初始蛇身
  const mid = Math.floor(GRID_COUNT / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid }
  ];

  direction = 'right';
  nextDirection = 'right';
  isRunning = true;

  spawnFood();

  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(update, SPEED_INITIAL);
}

// ========== 生成食物 ==========
function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID_COUNT),
      y: Math.floor(Math.random() * GRID_COUNT)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ========== 游戏更新 ==========
function update() {
  if (!isRunning) return;

  direction = nextDirection;

  const head = { ...snake[0] };

  switch (direction) {
    case 'up': head.y--; break;
    case 'down': head.y++; break;
    case 'left': head.x--; break;
    case 'right': head.x++; break;
  }

  // 碰墙检测
  if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
    gameOver();
    return;
  }

  // 碰自己检测
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // 吃到食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    spawnFood();

    // 加速
    clearInterval(gameLoop);
    const speed = Math.max(SPEED_MIN, SPEED_INITIAL - Math.floor(score / 10) * SPEED_STEP);
    gameLoop = setInterval(update, speed);
  } else {
    snake.pop();
  }

  draw();
}

// ========== 绘制 ==========
function draw() {
  // 背景
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线（淡）
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * cellSize, 0);
    ctx.lineTo(i * cellSize, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * cellSize);
    ctx.lineTo(canvas.width, i * cellSize);
    ctx.stroke();
  }

  // 蛇身
  snake.forEach((seg, i) => {
    const ratio = 1 - (i / snake.length) * 0.5;

    if (i === 0) {
      // 蛇头
      ctx.fillStyle = '#4ecca3';
      ctx.shadowColor = '#4ecca3';
      ctx.shadowBlur = 8;
    } else {
      ctx.fillStyle = `rgba(78, 204, 163, ${ratio})`;
      ctx.shadowBlur = 0;
    }
    
    const padding = 1;
    const radius = cellSize * 0.3;
    const x = seg.x * cellSize + padding;
    const y = seg.y * cellSize + padding;
    const w = cellSize - padding * 2;
    const h = cellSize - padding * 2;
    
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.fill();
    
    // 蛇眼
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      let eye1x, eye1y, eye2x, eye2y;
      const es = cellSize * 0.15;
    
      switch (direction) {
        case 'up':
          eye1x = seg.x * cellSize + cellSize * 0.3;
          eye1y = seg.y * cellSize + cellSize * 0.25;
          eye2x = seg.x * cellSize + cellSize * 0.7 - es;
          eye2y = eye1y;
          break;
        case 'down':
          eye1x = seg.x * cellSize + cellSize * 0.3;
          eye1y = seg.y * cellSize + cellSize * 0.65;
          eye2x = seg.x * cellSize + cellSize * 0.7 - es;
          eye2y = eye1y;
          break;
        case 'left':
          eye1x = seg.x * cellSize + cellSize * 0.2;
          eye1y = seg.y * cellSize + cellSize * 0.25;
          eye2x = eye1x;
          eye2y = seg.y * cellSize + cellSize * 0.65;
          break;
        case 'right':
          eye1x = seg.x * cellSize + cellSize * 0.7 - es;
          eye1y = seg.y * cellSize + cellSize * 0.25;
          eye2x = eye1x;
          eye2y = seg.y * cellSize + cellSize * 0.65;
          break;
      }
    
      ctx.beginPath();
      ctx.arc(eye1x + es/2, eye1y + es/2, es, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eye2x + es/2, eye2y + es/2, es, 0, Math.PI * 2);
      ctx.fill();
    
      // 瞳孔
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(eye1x + es/2, eye1y + es/2, es * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eye2x + es/2, eye2y + es/2, es * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // 食物
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#e94560';

  const fx = food.x * cellSize + cellSize / 2;
  const fy = food.y * cellSize + cellSize / 2;
  const fr = cellSize * 0.35;

  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();

  // 食物高光
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(fx - fr * 0.25, fy - fr * 0.25, fr * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

// ========== 游戏结束 ==========
function gameOver() {
  isRunning = false;
  clearInterval(gameLoop);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore.toString());
  }

  // 闪烁效果
  let blink = 0;
  const blinkInterval = setInterval(() => {
    if (blink >= 6) {
      clearInterval(blinkInterval);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('bestScore').textContent = highScore;
      document.getElementById('gameOverOverlay').classList.remove('hidden');
      return;
    }
    if (blink % 2 === 0) {
      ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      draw();
    }
    blink++;
  }, 100);
}

// ========== 方向控制 ==========
function changeDir(dir) {
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (dir !== opposites[direction]) {
    nextDirection = dir;
  }
}

// ========== 键盘控制 ==========
document.addEventListener('keydown', (e) => {
  const keyMap = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', s: 'down', a: 'left', d: 'right',
    W: 'up', S: 'down', A: 'left', D: 'right'
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    changeDir(keyMap[e.key]);
  }
});

// ========== 触摸滑动控制 ==========
document.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (!touchStartX || !touchStartY) return;

  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;

  const minSwipe = 30;

  if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    changeDir(dx > 0 ? 'right' : 'left');
  } else {
    changeDir(dy > 0 ? 'down' : 'up');
  }

  touchStartX = null;
  touchStartY = null;
}, { passive: true });

// ========== 窗口大小变化 ==========
window.addEventListener('resize', () => {
  initCanvas();
  if (isRunning) draw();
});

// ========== 初始化 ==========
initCanvas();
draw && (function() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
})();
</script>

</body>
</html>
